name: Build and Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/uems-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Ensure the project directory exists
            mkdir -p ~/projects/uems
            cd ~/projects/uems

            # Write the docker-compose-frontend.yml file dynamically
            cat << 'EOF' > docker-compose-frontend.yml
            services:
              uems-frontend:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/uems-frontend:latest
                container_name: uems-frontend
                ports:
                  - "4041:80"
                restart: always
            EOF

            # Log in to Docker Hub (handles private repositories)
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # Pull the latest image
            docker compose -f docker-compose-frontend.yml pull

            # Run/restart the container
            docker compose -f docker-compose-frontend.yml up -d --remove-orphans

            # Clean up unused/dangling docker images to free up space
            docker image prune -f
